<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Ninja</title>
    <meta name="description" content="Slice the Truth. Avoid the Satire. Don't Let the Headlines Drop." />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://news-ninja.pages.dev" />
    <meta property="og:title" content="News Ninja" />
    <meta property="og:description" content="Slice the Truth. Avoid the Satire. Don't Let the Headlines Drop." />
    <meta property="og:image" content="/og.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://news-ninja.pages.dev" />
    <meta property="twitter:title" content="News Ninja" />
    <meta property="twitter:description" content="Slice the Truth. Avoid the Satire. Don't Let the Headlines Drop." />
    <meta property="twitter:image" content="/og.webp" />

    <link rel="preconnect" href="https://api.fonts.coollabs.io" crossorigin />
    <link
      href="https://api.fonts.coollabs.io/css2?family=Anton&family=Playfair+Display:ital,opsz,wght@0,5..1200,400..900;1,5..1200,400..900&family=JetBrains+Mono:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <script async src="https://vibejam.cc/2026/widget.js"></script>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error([error.err.message, error.err.frame].filter(Boolean).join('\n'));
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
